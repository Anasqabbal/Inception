<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Inception Project</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="style.css?v=4">
</head>
<body>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
		<div class="container-fluid">
			<a class="navbar-brand" href="#home">Inception</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse justify-content-end" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
					<li class="nav-item"><a class="nav-link" href="#images">Images</a></li>
					<li class="nav-item"><a class="nav-link" href="#about">About</a></li>
					<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="middle-page">
		<section id="home" class="section d-flex flex-column justify-content-center align-items-center text-center">
			<h1 class="text-primary">Welcome to Inception Project</h1>
			<p class="container"> This project involves setting up a small infrastructure composed of different services under specific rules.</p>
		</section>

		<section id="images" class="section text-center">
			<h2>Project Preview</h2>
			<div class="container">
				<img src="./images/simplebackground.jpeg" class="img-fluid rounded shadow" alt="Inception Project Preview">
			</div>
		</section>

		<section id="about" class="section text-center">
			<h2>About the Project</h2>
			<p class="container"> in this project we setup multiple services </p>
		</section>

		<section id="contact" class="section text-center">
			<h2>Contact Us</h2>
			<div class="container">
				<form class="contact-form mx-auto" style="max-width: 500px;">
					<div class="mb-3 text-start">
						<label for="name" class="form-label">Name</label>
						<input type="text" class="form-control" id="name" required>
					</div>
					<div class="mb-3 text-start">
						<label for="email" class="form-label">Email</label>
						<input type="email" class="form-control" id="email" required>
					</div>
					<div class="mb-3 text-start">
						<label for="message" class="form-label">Message</label>
						<textarea class="form-control" id="message" rows="5" required></textarea>
					</div>
					<button type="submit" class="btn btn-primary w-100">Send</button>
				</form>
			</div>
		</section>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
